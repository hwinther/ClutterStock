name: "Backend Container"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-container.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  BACKEND_SOLUTION_PATH: "backend"
  BACKEND_SOLUTION_FILE: "ClutterStock.slnx"
  API_PROJECT: "src/Api/Api.csproj"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ${{ env.BACKEND_SOLUTION_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "${{ env.BACKEND_SOLUTION_PATH }}/**/packages.lock.json"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore --locked-mode ${{ env.BACKEND_SOLUTION_FILE }}

      - name: Publish container to GHCR
        env:
          ContainerImageTags: ${{ github.sha }};latest
        run: |
          dotnet publish ${{ env.API_PROJECT }} \
            -c Release \
            --no-restore \
            -p:PublishProfile=DefaultContainer \
            -p:ContainerRegistry=ghcr.io \
            -p:ContainerRepository=${{ github.repository }}/api
