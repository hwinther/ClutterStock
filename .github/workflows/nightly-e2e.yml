name: "Nightly E2E (Allure)"

on:
  workflow_dispatch:
  schedule:
    # 03:00 UTC daily — picks up the prior day's main-merge `:latest` images.
    - cron: "0 3 * * *"

concurrency:
  # Don't cancel an in-flight run if the cron and a manual dispatch overlap;
  # let the second one queue. Two daily runs racing on :latest history is
  # last-writer-wins anyway, not catastrophic.
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      checks: write
    environment: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Resolve :latest image refs
        run: |
          set -euo pipefail
          REPO=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "API_IMAGE=ghcr.io/${REPO}/api:latest"           >> $GITHUB_ENV
          echo "MIGRATOR_IMAGE=ghcr.io/${REPO}/migrator:latest" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${REPO}/frontend:latest" >> $GITHUB_ENV

      - name: Pull allure-history image
        continue-on-error: true
        run: |
          set -euo pipefail
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${REPO}/allure-history:latest"
          if docker pull "$IMG" 2>/dev/null; then
            # FROM-scratch image has no CMD; pass a dummy so `docker create`
            # passes spec validation. We only cp out then rm — never start.
            cid=$(docker create "$IMG" /history.jsonl)
            docker cp "$cid:/history.jsonl" frontend/allure-history.jsonl
            docker rm "$cid" >/dev/null
            echo "Restored history.jsonl ($(wc -l < frontend/allure-history.jsonl) entries)."
          else
            echo "No history image yet — first run."
          fi

      - name: Pull images
        run: docker compose -f docker-compose.e2e.yml pull

      - name: Start stack
        run: docker compose -f docker-compose.e2e.yml up -d --wait --wait-timeout 180

      - name: Run Playwright
        working-directory: frontend
        env:
          CI: "true"
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_OTP_SECRET: ${{ secrets.E2E_OTP_SECRET }}
        run: npx playwright test

      - name: Capture compose logs
        if: always()
        run: docker compose -f docker-compose.e2e.yml logs --no-color > compose-logs.txt

      # The lighthouse HTML lives at frontend/test-results/perf.home-*/lighthouse-home.html
      # (written by playwright-lighthouse). testInfo.attach() also copies it
      # under monocart-report/ but with a content-hash filename, which
      # changes every run and can't be linked from README. Drop a stable copy
      # next to monocart's index.html so the Pages site has a fixed URL.
      - name: Stage Lighthouse report at stable path
        if: always()
        run: |
          set -euo pipefail
          if [ ! -d frontend/monocart-report ]; then
            echo "monocart-report not produced — skipping lighthouse staging."
            exit 0
          fi
          LH=$(find frontend/test-results -name 'lighthouse-home.html' -type f 2>/dev/null | sort | tail -1)
          if [ -n "$LH" ]; then
            cp "$LH" frontend/monocart-report/lighthouse-home.html
            echo "Staged $LH -> frontend/monocart-report/lighthouse-home.html"
          else
            echo "No lighthouse-home.html found in test-results — skipping."
          fi

      # Symmetric to the HTML stage step above. The badge generator needs a
      # stable path; playwright-lighthouse writes the JSON next to the HTML
      # under a content-hashed test-results/perf.home-*/ directory.
      - name: Stage Lighthouse JSON at stable path
        if: always()
        run: |
          set -euo pipefail
          if [ ! -d frontend/monocart-report ]; then
            echo "monocart-report not produced — skipping lighthouse JSON staging."
            exit 0
          fi
          LH=$(find frontend/test-results -name 'lighthouse-home.json' -type f 2>/dev/null | sort | tail -1)
          if [ -n "$LH" ]; then
            cp "$LH" frontend/monocart-report/lighthouse-home.json
            echo "Staged $LH -> frontend/monocart-report/lighthouse-home.json"
          else
            echo "No lighthouse-home.json found in test-results — skipping."
          fi

      # Render e2e coverage + Lighthouse SVG badges. They ship out via the
      # badges-e2e GHCR image, where api-docs-pages.yml picks them up on the
      # workflow_run trigger to embed under /badges/ on the Pages site.
      - name: Install badge generator deps
        if: ${{ success() || failure() }}
        run: npm ci
        working-directory: scripts/badges

      - name: Generate e2e + Lighthouse badge SVGs
        if: ${{ success() || failure() }}
        run: |
          set -euo pipefail
          mkdir -p badges-e2e
          E2E_COV_ARG=()
          if [ -f frontend/monocart-coverage/cobertura-coverage.xml ]; then
            E2E_COV_ARG=(--e2e-cobertura frontend/monocart-coverage/cobertura-coverage.xml)
          else
            echo "::warning::No monocart cobertura-coverage.xml — skipping e2e coverage badge."
          fi
          LH_ARG=()
          if [ -f frontend/monocart-report/lighthouse-home.json ]; then
            LH_ARG=(--lighthouse-json frontend/monocart-report/lighthouse-home.json)
          else
            echo "::warning::No lighthouse-home.json — skipping lighthouse badges."
          fi
          if [ "${#E2E_COV_ARG[@]}" -eq 0 ] && [ "${#LH_ARG[@]}" -eq 0 ]; then
            echo "Nothing to render. Leaving badges-e2e empty."
            exit 0
          fi
          node scripts/badges/generate-badges.mjs \
            "${E2E_COV_ARG[@]}" \
            "${LH_ARG[@]}" \
            --out badges-e2e/

      - name: Push badges-e2e image
        if: ${{ success() || failure() }}
        run: |
          set -euo pipefail
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          if [ ! -d badges-e2e ] || [ -z "$(ls -A badges-e2e 2>/dev/null)" ]; then
            echo "No badges-e2e/ produced — skipping image push."
            exit 0
          fi
          docker build -t "ghcr.io/${REPO}/badges-e2e:latest" \
            -f scripts/badges-e2e.Dockerfile .
          docker push "ghcr.io/${REPO}/badges-e2e:latest"

      - name: Generate Allure report
        if: always()
        working-directory: frontend
        run: npx allure generate ./allure-results --output ./allure-report

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-report
          path: frontend/allure-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload traces and compose logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: traces-and-logs
          path: |
            frontend/test-results/
            compose-logs.txt
          retention-days: 14
          if-no-files-found: warn

      # Failed runs are signal — record them in the trend. Only `cancelled` is
      # excluded, since cancellation produces no meaningful new history point.
      - name: Push allure-history image
        if: ${{ success() || failure() }}
        run: |
          set -euo pipefail
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          if [ ! -f frontend/allure-history.jsonl ]; then
            echo "No history.jsonl produced — skipping."
            exit 0
          fi
          cp frontend/allure-history.jsonl ./history.jsonl
          docker build -t "ghcr.io/${REPO}/allure-history:latest" \
            -f scripts/allure-history.Dockerfile .
          docker push "ghcr.io/${REPO}/allure-history:latest"

      - name: Push allure-report image
        if: ${{ success() || failure() }}
        run: |
          set -euo pipefail
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          if [ ! -d frontend/allure-report ]; then
            echo "No allure-report directory produced — skipping."
            exit 0
          fi
          docker build -t "ghcr.io/${REPO}/allure-report:latest" \
            -f scripts/allure-report.Dockerfile frontend/
          docker push "ghcr.io/${REPO}/allure-report:latest"

      # Same success-or-failure gate as Allure — a failed run still produces
      # the dashboard and coverage view, and that's what we want on Pages.
      - name: Push monocart-report image
        if: ${{ success() || failure() }}
        run: |
          set -euo pipefail
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          if [ ! -d frontend/monocart-report ]; then
            echo "No monocart-report directory produced — skipping."
            exit 0
          fi
          docker build -t "ghcr.io/${REPO}/monocart-report:latest" \
            -f scripts/monocart-report.Dockerfile frontend/
          docker push "ghcr.io/${REPO}/monocart-report:latest"

      - name: Push monocart-coverage image
        if: ${{ success() || failure() }}
        run: |
          set -euo pipefail
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          if [ ! -d frontend/monocart-coverage ]; then
            echo "No monocart-coverage directory produced — skipping."
            exit 0
          fi
          docker build -t "ghcr.io/${REPO}/monocart-coverage:latest" \
            -f scripts/monocart-coverage.Dockerfile frontend/
          docker push "ghcr.io/${REPO}/monocart-coverage:latest"

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
