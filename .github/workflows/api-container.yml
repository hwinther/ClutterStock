name: "Publish api container to GHCR"

on:
  workflow_dispatch:
    inputs:
      grype_fail_build:
        description: "Fail the build if Grype finds vulnerabilities"
        type: boolean
        default: true
  push:
    tags:
      - "v*"
    paths:
      - "backend/**"
  # pull_request:
  #   branches:
  #     - main
  #   paths:
  #     - "backend/**"
  #     - ".github/workflows/backend-container.yml"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  actions: write
  security-events: write

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  dotnet_container:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    uses: hwinther/reusable-workflows/.github/workflows/dotnet-container.yml@feat/grype
    with:
      dotnet_version: 10.0.x
      solution_path: backend
      solution_file: ClutterStock.slnx
      project_file: src/Api/Api.csproj
      container_registry: ghcr.io
      container_image_name_postfix: api
      grype_fail_build: ${{ github.event_name != 'workflow_dispatch' || fromJSON(github.event.inputs.grype_fail_build || 'true') }}
