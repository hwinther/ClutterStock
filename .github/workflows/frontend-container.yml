name: "Frontend Container"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    paths:
      - "frontend/**"
  # pull_request:
  #   branches:
  #     - main
  #   paths:
  #     - "frontend/**"
  #     - ".github/workflows/frontend-container.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

env:
  FRONTEND_PATH: "frontend"

jobs:
  gitversion:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    uses: hwinther/reusable-workflows/.github/workflows/gitversion.yml@v1
    with:
      docker_registry: ghcr.io
      docker_image: ${{ github.repository }}/frontend

  build-and-push:
    needs: gitversion
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container to GHCR
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.FRONTEND_PATH }}
          file: ${{ env.FRONTEND_PATH }}/Dockerfile
          push: true
          tags: ${{ needs.gitversion.outputs.dockerTags }}
