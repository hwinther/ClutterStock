name: "Publish frontend container to GHCR"

on:
  workflow_dispatch:
    inputs:
      grype_fail_build:
        description: "Fail the build if Grype finds vulnerabilities"
        type: boolean
        default: true
  push:
    tags:
      - "v*"
    paths:
      - "frontend/**"
  # pull_request:
  #   branches:
  #     - main
  #   paths:
  #     - "frontend/**"
  #     - ".github/workflows/frontend-container.yml"

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  frontend_container:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      actions: write
      security-events: write
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/docker-container.yml@67ef4a8614e14d29e0039410f41a7ab9a7af093f # v1.58.0
    with:
      container_registry: ghcr.io
      container_image_name_postfix: frontend
      build_context: frontend
      dockerfile: frontend/Dockerfile
      grype_fail_build: ${{ github.event_name != 'workflow_dispatch' || fromJSON(github.event.inputs.grype_fail_build || 'true') }}
