name: "API Docs (GitHub Pages)"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    paths:
      - "backend/**"
      - ".github/workflows/api-docs-pages.yml"
      - ".github/actions/schemaspy-report/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  BACKEND_SOLUTION_PATH: "backend"
  BACKEND_SOLUTION_FILE: "ClutterStock.slnx"
  API_PROJECT: "src/Api/Api.csproj"

jobs:
  build-api-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    defaults:
      run:
        working-directory: ${{ env.BACKEND_SOLUTION_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "${{ env.BACKEND_SOLUTION_PATH }}/**/packages.lock.json"

      - name: Restore and publish API
        run: |
          dotnet restore --locked-mode ${{ env.BACKEND_SOLUTION_FILE }}
          dotnet publish ${{ env.API_PROJECT }} -c Release --no-restore -p:InformationalVersion=${{ github.ref_name }} -p:SourceRevisionId=${{ github.sha }} -p:IncludeSourceRevisionInInformationalVersion=false -o publish-api

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Generate OpenAPI spec (Swashbuckle CLI)
        run: |
          ConnectionStrings__ClutterStock="Data Source=:memory:" dotnet swagger tofile --output ../openapi.json publish-api/Api.dll v1
        working-directory: ${{ github.workspace }}/${{ env.BACKEND_SOLUTION_PATH }}

      - name: Build ReDoc static HTML
        run: |
          mkdir -p api-docs
          npx --yes @redocly/cli build-docs openapi.json --output=api-docs/index.html
        working-directory: ${{ github.workspace }}

      - name: Generate database docs (SchemaSpy)
        uses: ./.github/actions/schemaspy-report
        with:
          output-path: ${{ github.workspace }}/api-docs/database

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: api-docs

  deploy:
    needs: build-api-docs
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v5

      - name: Add GitHub Pages URL to summary
        run: |
          echo "## API Docs Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deploy-pages.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
