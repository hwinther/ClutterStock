name: "API Docs (GitHub Pages)"

on:
  workflow_dispatch:
    inputs:
      include_api_redoc:
        description: Include OpenAPI / ReDoc (/api/)
        type: boolean
        default: true
      include_database_docs:
        description: Include SchemaSpy database docs (/database/)
        type: boolean
        default: true
      include_project_docs:
        description: Include Markdown project docs (/project-docs/)
        type: boolean
        default: true
      include_dotnet_coverage:
        description: Include .NET coverage (/coverage-dotnet/)
        type: boolean
        default: true
      include_node_coverage:
        description: Include Node coverage (/coverage-node/)
        type: boolean
        default: true
      include_e2e_allure:
        description: Include Playwright Allure report (/e2e-allure/)
        type: boolean
        default: true
      include_e2e_monocart:
        description: Include monocart e2e dashboard + V8 coverage (/e2e-report/, /coverage-e2e/)
        type: boolean
        default: true
      include_badges:
        description: Include self-rendered SVG coverage / Lighthouse / status badges (/badges/)
        type: boolean
        default: true
      include_zap_report:
        description: Include OWASP ZAP DAST report (/security/)
        type: boolean
        default: true
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "docs/**"
      - ".github/workflows/api-docs-pages.yml"
      - ".github/actions/schemaspy-report/**"
      - ".github/scripts/render_project_docs.py"
      - "scripts/badges/**"
      - "scripts/badges-e2e.Dockerfile"
      - "scripts/zap-report.Dockerfile"
      - ".zap/**"
      - "README.md"
  # Refresh signal-sourced artifacts (nightly-e2e badges, ZAP report) whenever
  # the source workflow finishes. The conclusion gate inside each job prevents
  # redeploying Pages from a failed source run.
  workflow_run:
    workflows: ["Nightly E2E (Allure)", "OWASP ZAP Scan"]
    types: [completed]
    branches: [main]

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_WORKING_DIRECTORY: "backend"
  DOTNET_SOLUTION_FILE: "ClutterStock.slnx"
  API_PROJECT: "src/Api/Api.csproj"
  API_OPENAPI_JSON: "src/Api/openapi.json"
  NODE_VERSION: "24.x"
  NODE_WORKING_DIRECTORY: "frontend"
  # Pin Docker images used by build-project-docs (render_project_docs.py).
  PANDOC_DOCKER_IMAGE: "pandoc/minimal:3.7"
  MERMAID_CLI_DOCKER_IMAGE: "minlag/mermaid-cli:11.4.2"

jobs:
  build-api-docs:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_api_redoc) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      actions: write
    defaults:
      run:
        working-directory: ${{ env.DOTNET_WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "${{ env.DOTNET_WORKING_DIRECTORY }}/**/packages.lock.json"

      - name: Restore and publish API
        run: |
          dotnet restore --locked-mode ${{ env.DOTNET_SOLUTION_FILE }}
          dotnet publish ${{ env.API_PROJECT }} -c Debug --no-restore -p:InformationalVersion=${{ github.ref_name }} -p:SourceRevisionId=${{ github.sha }}

      - name: Build ReDoc static HTML
        run: |
          mkdir -p api-docs
          npx --yes @redocly/cli build-docs ${{ env.API_OPENAPI_JSON }} --output=api-docs/index.html

      - name: Upload API docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-api-docs
          path: ${{ env.DOTNET_WORKING_DIRECTORY }}/api-docs

  dotnet-database-docs:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_database_docs) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      actions: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clutterstock
          POSTGRES_PASSWORD: clutterstock
          POSTGRES_DB: clutterstock
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # SchemaSpy runs inside Docker so localhost maps to host.docker.internal there
      # (the python wrapper rewrites it). The Migrator runs directly on the runner
      # and reaches the postgres service via the published 5432 port on localhost.
      SCHEMASPY_PG_CONN: "Host=localhost;Port=5432;Username=clutterstock;Password=clutterstock;Database=clutterstock"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "${{ env.DOTNET_WORKING_DIRECTORY }}/**/packages.lock.json"

      - name: Apply database migrations (Migrator → postgres)
        working-directory: ${{ env.DOTNET_WORKING_DIRECTORY }}
        run: |
          dotnet restore --locked-mode "${{ env.DOTNET_SOLUTION_FILE }}"
          dotnet run --project src/Migrator/Migrator.csproj --no-restore -- "${SCHEMASPY_PG_CONN}"

      - name: Generate database docs (SchemaSpy)
        uses: ./.github/actions/schemaspy-report
        with:
          working_directory: ${{ env.DOTNET_WORKING_DIRECTORY }}
          solution_file: ${{ env.DOTNET_SOLUTION_FILE }}
          output_path: ${{ github.workspace }}/api-docs/database
          database_type: postgres
          connection_string: ${{ env.SCHEMASPY_PG_CONN }}

      - name: Upload database docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-database-docs
          path: api-docs/database

  build-project-docs:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_project_docs) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Render project docs (Pandoc + Mermaid CLI)
        run: python3 .github/scripts/render_project_docs.py

      - name: Upload project docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-project-docs
          path: api-docs/project-docs

  dotnet-test-and-coverage:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_dotnet_coverage) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "${{ env.DOTNET_WORKING_DIRECTORY }}/**/packages.lock.json"

      - name: Restore
        working-directory: ${{ env.DOTNET_WORKING_DIRECTORY }}
        run: dotnet restore --locked-mode "${{ env.DOTNET_SOLUTION_FILE }}"

      - name: Test with Coverlet (Cobertura)
        working-directory: ${{ env.DOTNET_WORKING_DIRECTORY }}
        run: >
          dotnet test --solution "${{ env.DOTNET_SOLUTION_FILE }}"
          --no-restore
          --coverlet
          --coverlet-output-format cobertura
          --configuration Release

      - name: Generate coverage HTML + JSON summary (ReportGenerator)
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # v5.5.10
        with:
          reports: "${{ github.workspace }}/${{ env.DOTNET_WORKING_DIRECTORY }}/**/TestResults/**/coverage.cobertura.*.xml"
          targetdir: "${{ github.workspace }}/coverage-html-dotnet"
          # JsonSummary aggregates across coverlet shards once, so the badge
          # generator can read a single file (Summary.json) instead of doing
          # the lines-covered/lines-valid math itself.
          reporttypes: Html;JsonSummary

      - name: Upload dotnet coverage report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-coverage-dotnet
          path: coverage-html-dotnet

      - name: Upload dotnet coverage summary artifact (for badges)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-coverage-dotnet-summary
          path: coverage-html-dotnet/Summary.json

  node-test-and-coverage:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_node_coverage) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "${{ env.NODE_WORKING_DIRECTORY }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ env.NODE_WORKING_DIRECTORY }}
        run: npm ci

      - name: Test with coverage (Cobertura)
        working-directory: ${{ env.NODE_WORKING_DIRECTORY }}
        run: npm run coverage:ci -- --coverage.include=app/**/*.ts --coverage.include=app/**/*.tsx

      - name: Generate coverage HTML (ReportGenerator)
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # v5.5.10
        with:
          reports: "${{ github.workspace }}/${{ env.NODE_WORKING_DIRECTORY }}/coverage/cobertura-coverage.xml"
          targetdir: "${{ github.workspace }}/coverage-html-node"
          reporttypes: Html

      - name: Upload node coverage report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-coverage-node
          path: coverage-html-node

      - name: Upload node Cobertura artifact (for badges)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-coverage-node-cobertura
          path: ${{ env.NODE_WORKING_DIRECTORY }}/coverage/cobertura-coverage.xml

  pull-e2e-allure:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_e2e_allure) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: read
      actions: write
    outputs:
      available: ${{ steps.pull-allure.outputs.available }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and extract Allure report image
        id: pull-allure
        run: |
          set -euo pipefail
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${REPO}/allure-report:latest"
          if docker pull "$IMG" 2>/dev/null; then
            # FROM-scratch image has no CMD; pass a dummy so `docker create`
            # passes spec validation. We only cp out then rm — never start.
            cid=$(docker create "$IMG" /allure-report)
            docker cp "$cid:/allure-report" ./allure-report
            docker rm "$cid" >/dev/null
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Extracted $(find ./allure-report -type f | wc -l) files from $IMG."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::${IMG} not found — the nightly E2E workflow has not seeded it yet. Skipping the e2e-allure section of the Pages site."
          fi

      - name: Upload e2e Allure report artifact
        if: steps.pull-allure.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-e2e-allure
          path: allure-report

  pull-e2e-monocart:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_e2e_monocart) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: read
      actions: write
    outputs:
      report_available: ${{ steps.pull-report.outputs.available }}
      coverage_available: ${{ steps.pull-coverage.outputs.available }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and extract monocart-report image
        id: pull-report
        run: |
          set -euo pipefail
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${REPO}/monocart-report:latest"
          if docker pull "$IMG" 2>/dev/null; then
            cid=$(docker create "$IMG" /monocart-report)
            docker cp "$cid:/monocart-report" ./monocart-report
            docker rm "$cid" >/dev/null
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Extracted $(find ./monocart-report -type f | wc -l) files from $IMG."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::${IMG} not found — the nightly E2E workflow has not seeded it yet. Skipping /e2e-report/."
          fi

      - name: Pull and extract monocart-coverage image
        id: pull-coverage
        run: |
          set -euo pipefail
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${REPO}/monocart-coverage:latest"
          if docker pull "$IMG" 2>/dev/null; then
            cid=$(docker create "$IMG" /monocart-coverage)
            docker cp "$cid:/monocart-coverage" ./monocart-coverage
            docker rm "$cid" >/dev/null
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Extracted $(find ./monocart-coverage -type f | wc -l) files from $IMG."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::${IMG} not found — the nightly E2E workflow has not seeded it yet. Skipping /coverage-e2e/."
          fi

      - name: Upload monocart report artifact
        if: steps.pull-report.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-e2e-monocart-report
          path: monocart-report

      - name: Upload monocart coverage artifact
        if: steps.pull-coverage.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-e2e-monocart-coverage
          path: monocart-coverage

  pull-zap-report:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_zap_report) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: read
      actions: write
    outputs:
      available: ${{ steps.pull-zap.outputs.available }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and extract zap-report image
        id: pull-zap
        run: |
          set -euo pipefail
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${REPO}/zap-report:latest"
          if docker pull "$IMG" 2>/dev/null; then
            cid=$(docker create "$IMG" /zap-report)
            docker cp "$cid:/zap-report" ./zap-report
            docker rm "$cid" >/dev/null
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Extracted $(find ./zap-report -type f | wc -l) files from $IMG."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::${IMG} not found — the OWASP ZAP Scan workflow has not seeded it yet. Skipping /security/."
          fi

      - name: Upload zap-report artifact
        if: steps.pull-zap.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-zap-report
          path: zap-report

  generate-badges:
    needs:
      - dotnet-test-and-coverage
      - node-test-and-coverage
      - pull-zap-report
    runs-on: ubuntu-latest
    if: |
      always() &&
      !cancelled() &&
      (
        (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) ||
        (github.event_name == 'workflow_dispatch' && inputs.include_badges) ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      ) &&
      (needs.dotnet-test-and-coverage.result == 'success' || needs.dotnet-test-and-coverage.result == 'skipped') &&
      (needs.node-test-and-coverage.result == 'success' || needs.node-test-and-coverage.result == 'skipped') &&
      (needs.pull-zap-report.result == 'success' || needs.pull-zap-report.result == 'skipped')
    permissions:
      contents: read
      packages: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # workflow_run defaults to the default branch's checkout, but the
          # head_branch is what triggered us — be explicit so the script
          # version matches the source workflow's commit.
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install badge generator deps
        run: npm ci
        working-directory: scripts/badges

      - name: Download dotnet coverage summary
        if: needs.dotnet-test-and-coverage.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-coverage-dotnet-summary
          path: dotnet-summary

      - name: Download node Cobertura
        if: needs.node-test-and-coverage.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-coverage-node-cobertura
          path: node-cobertura

      - name: Download zap-report (for security-zap.svg)
        if: needs.pull-zap-report.result == 'success' && needs.pull-zap-report.outputs.available == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-zap-report
          path: zap-report

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pre-rendered nightly-only badges (e2e coverage %, Lighthouse scores)
      # are seeded by the nightly E2E workflow into a FROM-scratch image.
      # Mirrors pull-e2e-allure exactly. Missing image = first deploy before
      # the nightly seeded it; downstream copy is conditional.
      - name: Pull and extract badges-e2e image
        id: pull-badges-e2e
        continue-on-error: true
        run: |
          set -euo pipefail
          REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${REPO}/badges-e2e:latest"
          if docker pull "$IMG" 2>/dev/null; then
            cid=$(docker create "$IMG" /badges-e2e)
            docker cp "$cid:/badges-e2e" ./badges-e2e
            docker rm "$cid" >/dev/null
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Extracted $(find ./badges-e2e -type f | wc -l) files from $IMG."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::${IMG} not found — the nightly E2E workflow has not seeded it yet. /badges/ will only contain backend + frontend coverage on this deploy."
          fi

      - name: Render coverage + nightly-status SVGs
        env:
          # Source workflow name when triggered by workflow_run (empty otherwise).
          # Used to scope which cached SVG gets overwritten — only the
          # nightly-e2e workflow_run should refresh nightly-e2e.svg.
          SOURCE_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: |
          set -euo pipefail
          mkdir -p badges
          # Carry forward nightly-derived SVGs first (e2e coverage, Lighthouse,
          # last successful nightly status). Backend/frontend overwrites below
          # are intentional — they're regenerated from this run's coverage.
          if [ -d badges-e2e ]; then
            cp -v badges-e2e/*.svg badges/ 2>/dev/null || true
          fi
          # Carry forward the ZAP findings badge — rendered inline by the zap
          # workflow, shipped via the zap-report image, surfaced here.
          if [ -f zap-report/security-zap.svg ]; then
            cp -v zap-report/security-zap.svg badges/
          fi

          BACKEND_ARG=()
          if [ -f dotnet-summary/Summary.json ]; then
            BACKEND_ARG=(--backend-summary-json dotnet-summary/Summary.json)
          fi
          FRONTEND_ARG=()
          if [ -f node-cobertura/cobertura-coverage.xml ]; then
            FRONTEND_ARG=(--frontend-cobertura node-cobertura/cobertura-coverage.xml)
          fi
          # Only update nightly-e2e.svg when the source of this run is the
          # nightly workflow itself. ZAP-triggered runs leave the cached
          # nightly status badge alone.
          STATUS_ARG=()
          if [ "${{ github.event_name }}" = "workflow_run" ] && [ "$SOURCE_WORKFLOW" = "Nightly E2E (Allure)" ]; then
            STATUS_ARG=(--nightly-status "${{ github.event.workflow_run.conclusion }}")
          fi

          if [ "${#BACKEND_ARG[@]}" -eq 0 ] && [ "${#FRONTEND_ARG[@]}" -eq 0 ] && [ "${#STATUS_ARG[@]}" -eq 0 ]; then
            echo "Nothing to (re)generate in this run; relying on cached nightly + zap badges."
          else
            node scripts/badges/generate-badges.mjs \
              "${BACKEND_ARG[@]}" \
              "${FRONTEND_ARG[@]}" \
              "${STATUS_ARG[@]}" \
              --out badges/
          fi

          ls -la badges/

      - name: Upload badges artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-badges
          path: badges
          if-no-files-found: warn

  assemble-github-pages:
    needs:
      - build-api-docs
      - dotnet-database-docs
      - build-project-docs
      - dotnet-test-and-coverage
      - node-test-and-coverage
      - pull-e2e-allure
      - pull-e2e-monocart
      - pull-zap-report
      - generate-badges
    runs-on: ubuntu-latest
    if: |
      always() &&
      !cancelled() &&
      (
        (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      ) &&
      (needs.build-api-docs.result == 'success' || needs.build-api-docs.result == 'skipped') &&
      (needs.dotnet-database-docs.result == 'success' || needs.dotnet-database-docs.result == 'skipped') &&
      (needs.build-project-docs.result == 'success' || needs.build-project-docs.result == 'skipped') &&
      (needs.dotnet-test-and-coverage.result == 'success' || needs.dotnet-test-and-coverage.result == 'skipped') &&
      (needs.node-test-and-coverage.result == 'success' || needs.node-test-and-coverage.result == 'skipped') &&
      (needs.pull-e2e-allure.result == 'success' || needs.pull-e2e-allure.result == 'skipped') &&
      (needs.pull-e2e-monocart.result == 'success' || needs.pull-e2e-monocart.result == 'skipped') &&
      (needs.pull-zap-report.result == 'success' || needs.pull-zap-report.result == 'skipped') &&
      (needs.generate-badges.result == 'success' || needs.generate-badges.result == 'skipped') &&
      needs.build-api-docs.result != 'failure' &&
      needs.dotnet-database-docs.result != 'failure' &&
      needs.build-project-docs.result != 'failure' &&
      needs.dotnet-test-and-coverage.result != 'failure' &&
      needs.node-test-and-coverage.result != 'failure' &&
      needs.pull-e2e-allure.result != 'failure' &&
      needs.pull-e2e-monocart.result != 'failure' &&
      needs.pull-zap-report.result != 'failure' &&
      needs.generate-badges.result != 'failure'
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Render repository README as site home page
        run: |
          mkdir -p site
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            "${{ env.PANDOC_DOCKER_IMAGE }}" \
            README.md \
            -o site/index.html \
            -f gfm \
            -t html \
            -s \
            --metadata title=ClutterStock

      - name: Download API docs
        if: needs.build-api-docs.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-api-docs
          path: site/api

      - name: Download dotnet database docs
        if: needs.dotnet-database-docs.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-database-docs
          path: site/database

      - name: Download project docs
        if: needs.build-project-docs.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-project-docs
          path: site/project-docs

      - name: Download dotnet coverage report
        if: needs.dotnet-test-and-coverage.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-coverage-dotnet
          path: site/coverage-dotnet

      - name: Download node coverage report
        if: needs.node-test-and-coverage.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-coverage-node
          path: site/coverage-node

      - name: Download e2e Allure report
        if: needs.pull-e2e-allure.result == 'success' && needs.pull-e2e-allure.outputs.available == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-e2e-allure
          path: site/e2e-allure

      - name: Download e2e monocart report
        if: needs.pull-e2e-monocart.result == 'success' && needs.pull-e2e-monocart.outputs.report_available == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-e2e-monocart-report
          path: site/e2e-report

      - name: Download e2e monocart coverage
        if: needs.pull-e2e-monocart.result == 'success' && needs.pull-e2e-monocart.outputs.coverage_available == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-e2e-monocart-coverage
          path: site/coverage-e2e

      - name: Download badges
        if: needs.generate-badges.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-badges
          path: site/badges

      - name: Download ZAP report
        if: needs.pull-zap-report.result == 'success' && needs.pull-zap-report.outputs.available == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-zap-report
          path: site/security

      - name: Rename ZAP HTML to index.html
        if: needs.pull-zap-report.result == 'success' && needs.pull-zap-report.outputs.available == 'true'
        run: |
          set -euo pipefail
          # action-baseline emits report.html; Pages serves /security/index.html
          # for a clean trailing-slash URL.
          if [ -f site/security/report.html ] && [ ! -f site/security/index.html ]; then
            cp site/security/report.html site/security/index.html
          fi
          ls -la site/security/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: assemble-github-pages
    # When optional jobs are skipped, assemble still runs via always(); without an
    # explicit if here, deploy can be incorrectly skipped (actions/runner#2205).
    if: always() && needs.assemble-github-pages.result == 'success' && !cancelled()
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Add GitHub Pages URL to summary
        run: |
          echo "## GitHub Pages published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          base="${{ steps.deploy-pages.outputs.page_url }}"
          base="${base%/}"
          echo "- Site home (README): ${base}/" >> "$GITHUB_STEP_SUMMARY"
          echo "- OpenAPI / ReDoc: ${base}/api/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dotnet coverage: ${base}/coverage-dotnet/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node coverage: ${base}/coverage-node/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Database docs (SchemaSpy): ${base}/database/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Project docs (Markdown): ${base}/project-docs/" >> "$GITHUB_STEP_SUMMARY"
          echo "- E2E Allure report: ${base}/e2e-allure/" >> "$GITHUB_STEP_SUMMARY"
          echo "- E2E monocart dashboard: ${base}/e2e-report/" >> "$GITHUB_STEP_SUMMARY"
          echo "- E2E monocart coverage: ${base}/coverage-e2e/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lighthouse report (latest nightly): ${base}/e2e-report/lighthouse-home.html" >> "$GITHUB_STEP_SUMMARY"
          echo "- Badges directory: ${base}/badges/" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Backend coverage: ${base}/badges/coverage-backend.svg" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Frontend coverage: ${base}/badges/coverage-frontend.svg" >> "$GITHUB_STEP_SUMMARY"
          echo "  - E2E coverage: ${base}/badges/coverage-e2e.svg" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Lighthouse perf: ${base}/badges/lighthouse-performance.svg" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Nightly E2E (cached): ${base}/badges/nightly-e2e.svg" >> "$GITHUB_STEP_SUMMARY"
          echo "  - ZAP findings: ${base}/badges/security-zap.svg" >> "$GITHUB_STEP_SUMMARY"
          echo "- OWASP ZAP report: ${base}/security/" >> "$GITHUB_STEP_SUMMARY"
