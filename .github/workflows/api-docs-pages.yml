name: "API Docs (GitHub Pages)"

on:
  workflow_dispatch:
    inputs:
      include_api_redoc:
        description: Include OpenAPI / ReDoc (/api/)
        type: boolean
        default: true
      include_database_docs:
        description: Include SchemaSpy database docs (/database/)
        type: boolean
        default: true
      include_project_docs:
        description: Include Markdown project docs (/project-docs/)
        type: boolean
        default: true
      include_dotnet_coverage:
        description: Include .NET coverage (/coverage-dotnet/)
        type: boolean
        default: true
      include_node_coverage:
        description: Include Node coverage (/coverage-node/)
        type: boolean
        default: true
  push:
    tags:
      - "v*"
    paths:
      - "backend/**"
      - "frontend/**"
      - "docs/**"
      - ".github/workflows/api-docs-pages.yml"
      - ".github/actions/schemaspy-report/**"
      - ".github/scripts/render_project_docs.py"
      - "README.md"

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_WORKING_DIRECTORY: "backend"
  DOTNET_SOLUTION_FILE: "ClutterStock.slnx"
  API_PROJECT: "src/Api/Api.csproj"
  API_OPENAPI_JSON: "src/Api/openapi.json"
  NODE_VERSION: "24.x"
  NODE_WORKING_DIRECTORY: "frontend"
  # Pin Docker images used by build-project-docs (render_project_docs.py).
  PANDOC_DOCKER_IMAGE: "pandoc/minimal:3.7"
  MERMAID_CLI_DOCKER_IMAGE: "minlag/mermaid-cli:11.4.2"

jobs:
  build-api-docs:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_api_redoc)
    permissions:
      contents: read
      actions: write
    defaults:
      run:
        working-directory: ${{ env.DOTNET_WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "${{ env.DOTNET_WORKING_DIRECTORY }}/**/packages.lock.json"

      - name: Restore and publish API
        run: |
          dotnet restore --locked-mode ${{ env.DOTNET_SOLUTION_FILE }}
          dotnet publish ${{ env.API_PROJECT }} -c Debug --no-restore -p:InformationalVersion=${{ github.ref_name }} -p:SourceRevisionId=${{ github.sha }}

      - name: Build ReDoc static HTML
        run: |
          mkdir -p api-docs
          npx --yes @redocly/cli build-docs ${{ env.API_OPENAPI_JSON }} --output=api-docs/index.html

      - name: Upload API docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-api-docs
          path: ${{ env.DOTNET_WORKING_DIRECTORY }}/api-docs

  dotnet-database-docs:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_database_docs)
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "${{ env.DOTNET_WORKING_DIRECTORY }}/**/packages.lock.json"

      - name: Generate database docs (SchemaSpy)
        uses: ./.github/actions/schemaspy-report
        with:
          working_directory: ${{ env.DOTNET_WORKING_DIRECTORY }}
          solution_file: ${{ env.DOTNET_SOLUTION_FILE }}
          migrator_project: src/Migrator/Migrator.csproj
          output_path: ${{ github.workspace }}/api-docs/database

      - name: Upload database docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-database-docs
          path: api-docs/database

  build-project-docs:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_project_docs)
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Render project docs (Pandoc + Mermaid CLI)
        run: python3 .github/scripts/render_project_docs.py

      - name: Upload project docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-project-docs
          path: api-docs/project-docs

  dotnet-test-and-coverage:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_dotnet_coverage)
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "${{ env.DOTNET_WORKING_DIRECTORY }}/**/packages.lock.json"

      - name: Restore
        working-directory: ${{ env.DOTNET_WORKING_DIRECTORY }}
        run: dotnet restore --locked-mode "${{ env.DOTNET_SOLUTION_FILE }}"

      - name: Test with Coverlet (Cobertura)
        working-directory: ${{ env.DOTNET_WORKING_DIRECTORY }}
        run: >
          dotnet test --solution "${{ env.DOTNET_SOLUTION_FILE }}"
          --no-restore
          --coverlet
          --coverlet-output-format cobertura
          --configuration Release

      - name: Generate coverage HTML (ReportGenerator)
        uses: danielpalme/ReportGenerator-GitHub-Action@7ae927204961589fcb0b0be245c51fbbc87cbca2 # v5.5.5
        with:
          reports: "${{ github.workspace }}/${{ env.DOTNET_WORKING_DIRECTORY }}/**/TestResults/**/coverage.cobertura.xml"
          targetdir: "${{ github.workspace }}/coverage-html-dotnet"
          reporttypes: Html

      - name: Upload dotnet coverage report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-coverage-dotnet
          path: coverage-html-dotnet

  node-test-and-coverage:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.include_node_coverage)
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "${{ env.NODE_WORKING_DIRECTORY }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ env.NODE_WORKING_DIRECTORY }}
        run: npm ci

      - name: Test with coverage (Cobertura)
        working-directory: ${{ env.NODE_WORKING_DIRECTORY }}
        run: npm run coverage:ci -- --coverage.include=app/**/*.ts --coverage.include=app/**/*.tsx

      - name: Generate coverage HTML (ReportGenerator)
        uses: danielpalme/ReportGenerator-GitHub-Action@7ae927204961589fcb0b0be245c51fbbc87cbca2 # v5.5.5
        with:
          reports: "${{ github.workspace }}/${{ env.NODE_WORKING_DIRECTORY }}/coverage/cobertura-coverage.xml"
          targetdir: "${{ github.workspace }}/coverage-html-node"
          reporttypes: Html

      - name: Upload node coverage report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-coverage-node
          path: coverage-html-node

  assemble-github-pages:
    needs:
      - build-api-docs
      - dotnet-database-docs
      - build-project-docs
      - dotnet-test-and-coverage
      - node-test-and-coverage
    runs-on: ubuntu-latest
    if: |
      always() &&
      !cancelled() &&
      (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        github.event_name == 'workflow_dispatch'
      ) &&
      (needs.build-api-docs.result == 'success' || needs.build-api-docs.result == 'skipped') &&
      (needs.dotnet-database-docs.result == 'success' || needs.dotnet-database-docs.result == 'skipped') &&
      (needs.build-project-docs.result == 'success' || needs.build-project-docs.result == 'skipped') &&
      (needs.dotnet-test-and-coverage.result == 'success' || needs.dotnet-test-and-coverage.result == 'skipped') &&
      (needs.node-test-and-coverage.result == 'success' || needs.node-test-and-coverage.result == 'skipped') &&
      needs.build-api-docs.result != 'failure' &&
      needs.dotnet-database-docs.result != 'failure' &&
      needs.build-project-docs.result != 'failure' &&
      needs.dotnet-test-and-coverage.result != 'failure' &&
      needs.node-test-and-coverage.result != 'failure'
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Render repository README as site home page
        run: |
          mkdir -p site
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            "${{ env.PANDOC_DOCKER_IMAGE }}" \
            README.md \
            -o site/index.html \
            -f gfm \
            -t html \
            -s \
            --metadata title=ClutterStock

      - name: Download API docs
        if: needs.build-api-docs.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-api-docs
          path: site/api

      - name: Download dotnet database docs
        if: needs.dotnet-database-docs.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-database-docs
          path: site/database

      - name: Download project docs
        if: needs.build-project-docs.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-project-docs
          path: site/project-docs

      - name: Download dotnet coverage report
        if: needs.dotnet-test-and-coverage.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-coverage-dotnet
          path: site/coverage-dotnet

      - name: Download node coverage report
        if: needs.node-test-and-coverage.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-coverage-node
          path: site/coverage-node

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: assemble-github-pages
    # When optional jobs are skipped, assemble still runs via always(); without an
    # explicit if here, deploy can be incorrectly skipped (actions/runner#2205).
    if: always() && needs.assemble-github-pages.result == 'success' && !cancelled()
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Add GitHub Pages URL to summary
        run: |
          echo "## GitHub Pages published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          base="${{ steps.deploy-pages.outputs.page_url }}"
          base="${base%/}"
          echo "- Site home (README): ${base}/" >> "$GITHUB_STEP_SUMMARY"
          echo "- OpenAPI / ReDoc: ${base}/api/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dotnet coverage: ${base}/coverage-dotnet/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node coverage: ${base}/coverage-node/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Database docs (SchemaSpy): ${base}/database/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Project docs (Markdown): ${base}/project-docs/" >> "$GITHUB_STEP_SUMMARY"
