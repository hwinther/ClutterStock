name: "PR build, scan, and E2E"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [opened, reopened, labeled, synchronize, ready_for_review]
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.e2e.yml"
      - ".github/workflows/pr-e2e.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.e2e.yml"
      - ".github/workflows/pr-e2e.yml"

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  api:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
      actions: write
      security-events: write
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/build-and-scan-dotnet.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      dotnet_version: 10.0.x
      solution_path: backend
      solution_file: ClutterStock.slnx
      project_file: src/Api/Api.csproj
      container_registry: ghcr.io
      container_image_name_postfix: api
      grype_fail_build: auto

  migrator:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
      actions: write
      security-events: write
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/build-and-scan-dotnet.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      dotnet_version: 10.0.x
      solution_path: backend
      solution_file: ClutterStock.slnx
      project_file: src/Migrator/Migrator.csproj
      container_registry: ghcr.io
      container_image_name_postfix: migrator
      grype_fail_build: auto

  frontend:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
      actions: write
      security-events: write
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/build-and-scan-docker.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      container_registry: ghcr.io
      container_image_name_postfix: frontend
      build_context: frontend
      dockerfile: frontend/Dockerfile
      grype_fail_build: auto

  e2e:
    needs: [api, migrator, frontend]
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    permissions:
      contents: read
      packages: read
      actions: read
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/playwright-e2e.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      compose_file: docker-compose.e2e.yml
      playwright_working_directory: frontend
      environment: build
      image_artifacts_json: |
        {"API_IMAGE":"${{ needs.api.outputs.image_artifact }}",
         "MIGRATOR_IMAGE":"${{ needs.migrator.outputs.image_artifact }}",
         "FRONTEND_IMAGE":"${{ needs.frontend.outputs.image_artifact }}"}
    secrets:
      e2e_username: ${{ secrets.E2E_USERNAME }}
      e2e_password: ${{ secrets.E2E_PASSWORD }}
      e2e_otp_secret: ${{ secrets.E2E_OTP_SECRET }}

  push-api:
    needs: [api, e2e]
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'deploy-feature') }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      actions: read
    uses: hwinther/reusable-workflows/.github/workflows/image-push.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      container_registry: ghcr.io
      container_image_name_postfix: api
      artifact_name: ${{ needs.api.outputs.image_artifact }}
      container_image_tags: ${{ needs.api.outputs.container_image_tags }}
      image_digest: ${{ needs.api.outputs.image_digest }}
      version: ${{ needs.api.outputs.version }}
      sbom_artifact_name: ${{ needs.api.outputs.sbom_artifact }}
      grype_artifact_name: ${{ needs.api.outputs.grype_artifact }}

  push-migrator:
    needs: [migrator, e2e]
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'deploy-feature') }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      actions: read
    uses: hwinther/reusable-workflows/.github/workflows/image-push.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      container_registry: ghcr.io
      container_image_name_postfix: migrator
      artifact_name: ${{ needs.migrator.outputs.image_artifact }}
      container_image_tags: ${{ needs.migrator.outputs.container_image_tags }}
      image_digest: ${{ needs.migrator.outputs.image_digest }}
      version: ${{ needs.migrator.outputs.version }}
      sbom_artifact_name: ${{ needs.migrator.outputs.sbom_artifact }}
      grype_artifact_name: ${{ needs.migrator.outputs.grype_artifact }}

  push-frontend:
    needs: [frontend, e2e]
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'deploy-feature') }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      actions: read
    uses: hwinther/reusable-workflows/.github/workflows/image-push.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      container_registry: ghcr.io
      container_image_name_postfix: frontend
      artifact_name: ${{ needs.frontend.outputs.image_artifact }}
      container_image_tags: ${{ needs.frontend.outputs.container_image_tags }}
      image_digest: ${{ needs.frontend.outputs.image_digest }}
      version: ${{ needs.frontend.outputs.version }}
      sbom_artifact_name: ${{ needs.frontend.outputs.sbom_artifact }}
      grype_artifact_name: ${{ needs.frontend.outputs.grype_artifact }}

  # Deploys an ephemeral preview env to the homelab cluster via GitOps. The reusable workflow
  # mints a GitHub App installation token, clones hwinther/proxmox, renders the per-PR overlay
  # under clusters/production/apps/previews/clutterstock/, and pushes one commit. Flux reconciles
  # within ~1 min.
  #
  # Same `deploy-feature` label gate as the push-* jobs so a PR opts into push + deploy together.
  # `needs:` on the push-* jobs ensures we deploy the exact digests that just landed in GHCR.
  deploy-preview:
    needs: [api, migrator, frontend, push-api, push-migrator, push-frontend]
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'deploy-feature') }}
    permissions:
      contents: read
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/gitops-preview-upsert.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      target_repo: hwinther/proxmox
      preview_base_path: clusters/production/apps/previews/clutterstock
      pr_number: ${{ github.event.pull_request.number }}
      host: clutterstock-${{ github.event.pull_request.number }}.preview.wsh.no
      db_name: clutterstock_pr${{ github.event.pull_request.number }}
      image_api_tag: ${{ needs.api.outputs.version }}
      image_api_digest: ${{ needs.push-api.outputs.image_digest }}
      image_frontend_tag: ${{ needs.frontend.outputs.version }}
      image_frontend_digest: ${{ needs.push-frontend.outputs.image_digest }}
      image_migrator_tag: ${{ needs.migrator.outputs.version }}
      image_migrator_digest: ${{ needs.push-migrator.outputs.image_digest }}
    secrets:
      app_id: ${{ secrets.PROXMOX_GITOPS_APP_ID }}
      app_private_key: ${{ secrets.PROXMOX_GITOPS_APP_PRIVATE_KEY }}

  # Single sticky PR comment with the preview URL once the GitOps commit has landed. Flux still
  # needs ~1 min to reconcile after this comment appears.
  comment-preview-url:
    needs: [deploy-preview]
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'deploy-feature') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post or update preview-URL sticky comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: clutterstock-preview-env
          message: |
            ### Preview environment

            Deployed via Flux (reconciles within ~1 min).

            - Preview URL: ${{ needs.deploy-preview.outputs.preview_url }}
            - Database: `clutterstock_pr${{ github.event.pull_request.number }}` on `cluttertestdb.postgres-test`
            - Image digests are pinned to the build that just passed e2e + grype.

            Closing the PR auto-removes the env via `pr-preview-cleanup.yml`.
