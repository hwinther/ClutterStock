name: "SchemaSpy Report (Test Artifact)"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/schemaspy-artifact-test.yml"
      - ".github/actions/schemaspy-report/**"

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  BACKEND_SOLUTION_PATH: "backend"
  SCHEMASPY_OUTPUT_PATH: "${{ github.workspace }}/schemaspy-report"

jobs:
  schemaspy-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "${{ env.BACKEND_SOLUTION_PATH }}/**/packages.lock.json"

      - name: Generate database docs (SchemaSpy)
        uses: ./.github/actions/schemaspy-report
        with:
          output-path: ${{ env.SCHEMASPY_OUTPUT_PATH }}

      - name: Upload SchemaSpy artifact
        uses: actions/upload-artifact@v4
        with:
          name: schemaspy-report
          path: ${{ env.SCHEMASPY_OUTPUT_PATH }}
          if-no-files-found: error

      - name: Add artifact info to summary
        run: |
          echo "## SchemaSpy Report Generated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact: schemaspy-report" >> "$GITHUB_STEP_SUMMARY"
