name: "Automatically update dotnet lockfiles in dependabot PRs"

on:
  pull_request_target:
    types:
      - labeled
      - synchronize

jobs:
  update-lockfiles:
    uses: hwinther/reusable-workflows/.github/workflows/dependabot-update-dotnet-lockfiles.yml@25185e2df48cbdd90df1a8ec70b01e9911aaadbc # v1.56.0
    permissions:
      contents: read
    with:
      solution_path: backend
      solution_name: ClutterStock.slnx
      dotnet_version: 10.0.x
    secrets:
      WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
