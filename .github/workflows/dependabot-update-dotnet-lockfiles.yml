name: "Automatically update dotnet lockfiles in dependabot PRs"

on:
  pull_request_target:
    types:
      - labeled
      - synchronize

jobs:
  update-lockfiles:
    uses: hwinther/reusable-workflows/.github/workflows/dependabot-update-dotnet-lockfiles.yml@67ef4a8614e14d29e0039410f41a7ab9a7af093f # v1.58.0
    permissions:
      contents: read
    with:
      solution_path: backend
      solution_name: ClutterStock.slnx
      dotnet_version: 10.0.x
    secrets:
      WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
